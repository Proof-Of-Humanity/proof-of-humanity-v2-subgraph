specVersion: 1.2.0
description: Proof of Humanity subgraph
features:
  - fullTextSearch
  - nonFatalErrors
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ProofOfHumanity
    network: gnosis
    source:
      address: "0xa4AC94C4fa65Bb352eFa30e3408e64F72aC857bc"
      abi: ProofOfHumanity
      startBlock: 35846827
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/index.ts
      entities:
        - Contract
        - ArbitratorData
        - Soul
        - Claimer
        - Request
        - Challenge
        - Round
        - Vouch
        - Contribution
        - Evidence
        - Counter
        - GlobalAnalytics
        - DailyAnalytics
      abis:
        - name: ProofOfHumanity
          file: ./abis/ProofOfHumanity.json
      eventHandlers:
        - event: Initialized()
          handler: handleInitialized
        - event: MetaEvidence(indexed uint256,string)
          handler: handleMetaEvidence
        - event: RequestBaseDepositChanged(uint256)
          handler: handleRequestBaseDepositChanged
        - event: DurationsChanged(uint40,uint40,uint40,uint40)
          handler: handleDurationsChanged
        - event: RequiredNumberOfVouchesChanged(uint32)
          handler: handleRequiredNumberOfVouchesChanged
        - event: ArbitratorChanged(address,bytes)
          handler: handleArbitratorChanged
        - event: HumanityGrantedDirectly(indexed bytes20,indexed address,uint40)
          handler: handleHumanityGrantedDirectly
        - event: HumanityDischargedDirectly(indexed bytes20)
          handler: handleHumanityDischargedDirectly
        - event: ClaimRequest(indexed address,indexed bytes20,uint256,string)
          handler: handleClaimRequest
        - event: RenewalRequest(indexed address,indexed bytes20,uint256)
          handler: handleRenewalRequest
        - event: RevocationRequest(indexed address,indexed bytes20,uint256)
          handler: handleRevocationRequest
        - event: VouchAdded(indexed address,indexed address,bytes20)
          handler: handleVouchAdded
        - event: VouchRemoved(indexed address,indexed address,bytes20)
          handler: handleVouchRemoved
        - event: VouchRegistered(indexed bytes20,indexed bytes20,uint256)
          handler: handleVouchRegistered
        - event: RequestWithdrawn(bytes20,uint256)
          handler: handleRequestWithdrawn
        - event: StateAdvanced(address)
          handler: handleStateAdvanced
        - event: RequestChallenged(bytes20,uint256,uint256,uint8,uint256)
          handler: handleRequestChallenged
        - event: HumanityClaimed(bytes20,uint256)
          handler: handleHumanityClaimed
        - event: HumanityRevoked(bytes20,uint256)
          handler: handleHumanityRevoked
        - event: VouchesProcessed(bytes20,uint256,uint256)
          handler: handleVouchesProcessed
        - event: ChallengePeriodRestart(bytes20,uint256,uint256)
          handler: handleChallengePeriodRestart
        - event: Ruling(indexed address,indexed uint256,uint256)
          handler: handleRuling
        - event: Evidence(indexed address,indexed uint256,indexed address,string)
          handler: handleEvidence
        - event: AppealCreated(address,uint256)
          handler: handleAppealCreated
        - event: Contribution(bytes20,uint256,uint256,uint256,address,uint256,uint8)
          handler: handleContribution
        - event: FeesAndRewardsWithdrawn(bytes20,uint256,uint256,uint256,address)
          handler: handleFeesAndRewardsWithdrawn
  - kind: ethereum
    name: CrossChainProofOfHumanity
    network: gnosis
    source:
      address: "0x16044E1063C08670f8653055A786b7CC2034d2b0"
      abi: CrossChainProofOfHumanity
      startBlock: 35846905
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/crosschain.ts
      entities:
        - Contract
        - ArbitratorData
        - Soul
        - Claimer
        - Request
        - Challenge
        - Round
        - Vouch
        - Contribution
        - Evidence
        - Counter
        - CrossChainGateway
        - CrossChainHumanity
        - OutTransfer
        - InTransfer
        - GlobalAnalytics
        - DailyAnalytics
      abis:
        - name: CrossChainProofOfHumanity
          file: ./abis/CrossChainProofOfHumanity.json
      eventHandlers:
        - event: GatewayAdded(indexed address,address)
          handler: handleGatewayAdded
        - event: GatewayRemoved(indexed address)
          handler: handleGatewayRemoved
        - event: UpdateInitiated(indexed bytes20,indexed address,uint40,bool,address)
          handler: handleUpdateInitiated
        - event: UpdateReceived(indexed bytes20,indexed address,uint40,bool)
          handler: handleUpdateReceived
        - event: TransferInitiated(indexed bytes20,indexed address,uint40,address,bytes32)
          handler: handleTransferInitiated
        - event: TransferReceived(indexed bytes20,indexed address,uint40,bytes32)
          handler: handleTransferReceived
  - kind: ethereum
    name: ProofOfHumanityCirclesProxy
    network: gnosis
    source:
      address: "0xf49aB03E980BD27ecf9352cAF4A65921DD70a554"
      abi: ProofOfHumanityCirclesProxy
      startBlock: 43089534
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/circlesProxy.ts
      entities:
        - CirclesAccount
      abis:
        - name: ProofOfHumanityCirclesProxy
          file: ./abis/ProofOfHumanityCirclesProxy.json
      eventHandlers:
        - event: AccountRegistered(indexed bytes20,indexed address,uint40,uint96)
          handler: handleAccountRegistered
        - event: TrustRenewed(indexed bytes20,indexed address,uint96)
          handler: handleTrustRenewed
        - event: TrustReEvaluationBatchProcessed(indexed address,uint256,uint256)
          handler: handleTrustReEvaluationBatchProcessed
        - event: TrustReEvaluationCompleted(indexed address,uint96)
          handler: handleTrustReEvaluationCompleted
  - kind: ethereum
    name: RewardDistributor
    network: gnosis
    source:
      address: "0x906113115C0A691F7E78dB91083EFfCD415Cb978"
      abi: RewardDistributor
      startBlock: 44279764
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/rewardDistributor.ts
      entities:
        - RewardClaim
        - Claimer
        - GlobalAnalytics
        - DailyAnalytics
      abis:
        - name: RewardDistributor
          file: ./abis/RewardDistributor.json
      eventHandlers:
        - event: Claimed(indexed bytes20)
          handler: handleClaimed
  - kind: ethereum
    name: SeerCredits
    network: gnosis
    source:
      address: "0xEDd48e43EBd4E2b31238a5CBA8FD548fC051aCAF"
      abi: SeerCredits
      startBlock: 42439735
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/seerCredits.ts
      entities:
        - GlobalAnalytics
        - DailyAnalytics
        - HumanAnalyticsProfile
      abis:
        - name: SeerCredits
          file: ./abis/SeerCredits.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
  - kind: ethereum
    name: ForesightGnosisRouter
    network: gnosis
    source:
      address: "0xeC9048b59b3467415b1a38F63416407eA0c70fB8"
      abi: GnosisRouter
      startBlock: 42439735
    mapping:
      kind: ethereum/calls
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/foresight.ts
      entities:
        - GlobalAnalytics
        - ForesightTrade
        - HumanAnalyticsProfile
      abis:
        - name: GnosisRouter
          file: ./abis/GnosisRouter.json
        - name: TradeExecutor
          file: ./abis/TradeExecutor.json
        - name: CrossChainProofOfHumanity
          file: ./abis/CrossChainProofOfHumanity.json
      callHandlers:
        - function: splitFromBase(address)
          handler: handleSplitFromBase
        - function: mergeToBase(address,uint256)
          handler: handleMergeToBase
        - function: redeemToBase(address,uint256[],uint256[])
          handler: handleRedeemToBase
        - function: splitPosition(address,address,uint256)
          handler: handleSplitPosition
        - function: mergePositions(address,address,uint256)
          handler: handleMergePositions
        - function: redeemPositions(address,address,uint256[],uint256[])
          handler: handleRedeemPositions
  - kind: ethereum
    name: ForesightCredits
    network: gnosis
    source:
      address: "0x09E7014D2c15Eb8C5ee25853FE6842FF5E2c94f9"
      abi: ForesightCredits
      startBlock: 42439735
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/foresight.ts
      entities:
        - GlobalAnalytics
        - ForesightCreditUse
        - HumanAnalyticsProfile
      abis:
        - name: ForesightCredits
          file: ./abis/ERC20Transfer.json
        - name: TradeExecutor
          file: ./abis/TradeExecutor.json
        - name: CrossChainProofOfHumanity
          file: ./abis/CrossChainProofOfHumanity.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleForesightCreditsTransfer
